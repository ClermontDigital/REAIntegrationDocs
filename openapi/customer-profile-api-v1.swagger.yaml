components:
  schemas:
    HttpApiDecodeError:
      type: object
      required:
        - issues
        - message
        - _tag
      properties:
        issues:
          type: array
          items:
            $ref: "#/components/schemas/Issue"
        message:
          type: string
        _tag:
          type: string
          enum:
            - HttpApiDecodeError
      additionalProperties: false
      description: The request did not match the expected schema
    Issue:
      type: object
      required:
        - _tag
        - path
        - message
      properties:
        _tag:
          type: string
          enum:
            - Pointer
            - Unexpected
            - Missing
            - Composite
            - Refinement
            - Transformation
            - Type
            - Forbidden
          description: The tag identifying the type of parse issue
        path:
          type: array
          items:
            $ref: "#/components/schemas/PropertyKey"
          description: The path to the property where the issue occurred
        message:
          type: string
          description: A descriptive message explaining the issue
      additionalProperties: false
      description: >-
        Represents an error encountered while parsing a value to match the
        schema
    PropertyKey:
      anyOf:
        - type: string
        - type: number
        - type: object
          required:
            - _tag
            - key
          properties:
            _tag:
              type: string
              enum:
                - symbol
            key:
              type: string
          additionalProperties: false
          description: an object to be decoded into a globally shared symbol
    NonEmptyString:
      type: string
      description: a non empty string
      title: nonEmptyString
      minLength: 1
    Int:
      type: integer
      description: an integer
      title: int
    UUID:
      type: string
      description: a Universally Unique Identifier
      format: uuid
      pattern: >-
        ^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$
    Rfc7807ApiError.DecodeError:
      type: object
      required:
        - type
        - title
        - status
        - detail
        - errors
        - _tag
      properties:
        type:
          $ref: "#/components/schemas/NonEmptyString"
        title:
          $ref: "#/components/schemas/NonEmptyString"
        status:
          type: number
        detail:
          $ref: "#/components/schemas/NonEmptyString"
        errors:
          type: array
          items:
            type: object
            required:
              - path
              - message
            properties:
              path:
                type: string
              message:
                $ref: "#/components/schemas/NonEmptyString"
            additionalProperties: false
        _tag:
          type: string
          enum:
            - Rfc7807ApiError.DecodeError
      additionalProperties: false
      description: The request did not match the expected schema (RFC 7807)
    BadRequest:
      $id: /schemas/void
      title: BadRequest
    NumberFromString:
      type: string
      description: a string to be decoded into a number
  securitySchemes:
    PartnerPlatform:
      type: oauth2
      description: OAuth 2 Client Credentials grant flow
      flows:
        clientCredentials:
          tokenUrl: https://api.realestate.com.au/oauth/token
          scopes:
            customer-profile:individual-customer:read: Retrieve customer profile data
            customer-profile:individual-customer:write: Create, update, and offboard customer profiles
security:
  - PartnerPlatform:
      - customer-profile:individual-customer:read
      - customer-profile:individual-customer:write

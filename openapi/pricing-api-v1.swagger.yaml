                        displayPrice: '$2000.00'
                        price: '2000.00'
                        rackPrice: '2000.00'
                        currency: AUD
                        topUpPrice: '1000.00'
                      - product: property-showcase
                        productName: Property Showcase - Buy
                        displayPrice: $100.00
                        price: '100.00'
                        rackPrice: '100.00'
                        currency: AUD
                    flex:
                      exceptionDowngrade:
                        - product: highlight
                          productName: Highlight (30 days) - Buy
                          duration: 30
                          displayPrice: $400.00
                          price: '400.00'
                          rackPrice: '800.00'
                          currency: AUD
                          points: 1
                        - product: feature
                          productName: Feature (30 days) - Buy
                          duration: 30
                          displayPrice: $200.00
                          price: '200.00'
                          rackPrice: '450.00'
                          currency: AUD
                          points: 1
                        - product: standard
                          productName: Standard - Buy
                          displayPrice: $30.00
                          price: '30.00'
                          rackPrice: '100.00'
                          currency: AUD
                          points: 1
                      payOnSale:
                        - product: premiere
                          productName: Premiere (60 days) - Buy
                          duration: 60
                          displayPrice: '$0.00 up front, $2,400.00 when sold'
                          price: '2400.00'

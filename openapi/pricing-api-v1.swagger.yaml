                FeatElect:
                  summary: Feature Elect
                  value:
                    _links:
                      self:
                        href: >-
                          https://api.realestate.com.au/prices/v1/realestate-properties?agency_id=FEXBNP&suburb=Sydney&state=NSW&postcode=2000
                    section: buy
                    listingType: rural
                    reupgrade: false

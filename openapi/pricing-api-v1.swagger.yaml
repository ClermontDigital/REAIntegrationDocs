                        rackPrice: '450.00'
                        currency: AUD
                    manual:
                      - product: premiere
                        productName: Premiere (60 days) - Buy
                        duration: 60
                        displayPrice: $2000.00
                        price: '2000.00'
                        rackPrice: '2000.00'
                        currency: AUD
                      - product: highlight
                        productName: Highlight (30 days) - Buy
                        duration: 30
                        displayPrice: $400.00
                        price: '400.00'
                        rackPrice: '800.00'
                        currency: AUD
                      - product: audience-maximiser
                        productName: Audience Maximiser
                        displayPrice: $250.00
                        price: '250.00'
                        rackPrice: '350.00'
                        currency: AUD
                      - product: property-showcase
                        productName: Property Showcase - Buy
                        displayPrice: $100.00
                        price: '100.00'
                        rackPrice: '100.00'
                        currency: AUD
                      - product: ebrochure
                        productName: eBrochure - Buy
                        displayPrice: $100.00

openapi: 3.0.3
info:
  title: Pricing API
  version: 0.1.1
  description: >
    ## Introduction

    The Pricing API provides prices for the various portals in REA. A portal can
    be realestate.com.au

    for example. Given a specific *location, agencyId and section* on the portal
    the

    API will return a list of products along with their respective price.
servers:
  - url: 'https://api.realestate.com.au/'
    description: production server with live data
security:
  - PartnerPlatform:
      - "pricing:products:read"
paths:
  /prices/v1/realestate-properties:
    get:
      summary: Product prices when listing properties on realestate.com.au
      description: >
        Customers listing on realestate.com.au can find out the products they
        have pre-selected to 

        automatically purchase along with the discounted price for them. In
        addition, this API will 

        also return other products that they can optionally choose to purchase
        or products that they

        have a minimum commitment to purchase. All products returned will be
        grouped in 1 of these

        categories:
          - **all:** these products will be automatically purchased on the customer's behalf when 
          they list on realestate.com.au
          - **elect:** these products are *not* automatically purchased, but customers can choose to
          purchase them at their discretion. However, they have a minimum number that have been
          committed to over a specified period of time
          - **manual:** these products can be manually purchased by the customer and are not 
          automatically purchased on their behalf.
          - **flex:** these products can be manually purchased, but require the customer to have
          the required number of **Campaign flex points** before they can access these product(s). **Note:** 
          the data returned does not check if the customer has the points necessary to
          purchase the product. Instead it just specifies how many points and price for each product.
          - **cappedProduct:** the capped product can be manually purchased if customer doesn't have **all** contract.
          Once they exceed the cap amount during the specified period,
          the price indicated will be charged to the customer for each listing that uses this type of product.
      operationId: realestatePrices
      security:
        - PartnerPlatform: ["pricing:products:read"]
      parameters:
        - name: agency_id
          description: >
            This is the unique 6 letter agency code for an office with an active
            subscription. Refer

            to 'API X' for a list of agency codes that can be accessed by the
            caller.
          in: query
          required: true
          style: form
          schema:
            type: string
            pattern: '^[A-Z]{6}$'
          example: FEXBNP
        - name: suburb
          description: >
            The name of the suburb where the property is physically located, as
            recognised by the 

            appropriate state government. The suburb specified must be a
            recognised suburb 

            according to Geoscience Australia (https://www.ga.gov.au/placename/)
          in: query
          required: true
          style: form
          schema:
            type: string
          example: Sydney
        - name: state
          description: >-
            This represents the state or territory where the listed property is
            located. Available values "ACT", "NSW", "NT", "QLD", "SA", "TAS", "VIC", "WA".
          in: query
          required: true
          style: form
          schema:
            type: string
            enum:
              - ACT
              - NSW
              - NT
              - QLD
              - SA
              - TAS
              - VIC
              - WA
          example: NSW
        - name: postcode
          description: >
            This is the recognised postal code for the property. The postcode
            specified must be

            recognised by Australia Post (https://auspost.com.au/postcode)

            officially
          in: query
          required: true
          style: form
          schema:
            type: string
            pattern: '^[0-9]{4}$'
          example: '2000'
        - name: section
          description: >
            This is the section on realestate.com.au that the customer wishes to
            list the property in.

            Depending on this section chosen, it may have an effect on the list
            of products available

            to the customer. When this isn't specified, it defaults to *buy*.
            Available values "buy", "rent", "sold".
          in: query
          required: false
          style: form
          schema:
            type: string
            enum:
              - buy
              - rent
              - sold
            default: buy
        - name: listing_type
          description: >
            This is the type of property that the customer wishes to list.
            Depending on the type of

            property, it may affect the list of products available to the
            customer. When this isn't

            specified, it defaults to *residential*. Available values "residential",
            "land", "rural".
          in: query
          required: false
          style: form
          schema:
            type: string
            enum:
              - residential
              - land
              - rural
            default: residential
        - name: reupgrade
          description: >
            This is used to indicate whether the product is priced for the
            initial upgrade or

            a subsequent reupgrade. When a property listed has already had a
            product upgraded, 

            it could entitle the customer to and additional discount on top of
            the initial

            upgrade discount. By default this is *false*.
          in: query
          required: false
          style: form
          schema:
            type: boolean
            default: false
        - name: date
          description: >
            This is the date that the customer wishes to list, and to return the
            price for this date.

            This is an optional parameter and defaults to today's date
            (Australian Eastern Daylight

            Savings Time). **Note:** we will not allow a date in the past, or a
            date longer than 46

            days from today's date.
          in: query
          required: false
          style: form
          schema:
            type: string
            format: date-time
          examples:
            utc:
              value: '2022-06-30T10:00:00Z'
              summary: A date-time in UTC.
            timezone:
              value: '2022-06-30T00:00:00+10:00'
              summary: A date-time with timezone.
      responses:
        '200':
          description: >
            The list of products and prices available to the customer for the
            specified 

            section and type of property.
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/realestate_products'
              examples:
                UMP:
                  summary: Ultimate Marketing Package
                  value:
                    _links:
                      self:
                        href: >-
                          https://api.realestate.com.au/prices/v1/realestate-properties?agency_id=FEXBNP&suburb=Sydney&state=NSW&postcode=2000
                    section: buy
                    listingType: residential
                    reupgrade: false
                    date: '1970-01-01'
                    all:
                      - product: premiere
